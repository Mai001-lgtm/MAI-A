<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>click Print &amp; Design</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'display': ['Space Grotesk', 'Noto Sans Thai', 'sans-serif'],
            'body': ['Noto Sans Thai', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    .font-display { font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .glass-heavy { background: rgba(15,23,42,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-full flex flex-col selection:bg-purple-500/30">

  <div id="auth-screen" class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 glass p-8 rounded-3xl relative overflow-hidden">
      <div class="absolute -top-10 -right-10 w-40 h-40 bg-purple-500/10 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-500/10 rounded-full blur-3xl"></div>
      
      <div class="text-center relative">
        <h1 class="text-3xl font-bold font-display bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">click Print &amp; Design</h1>
        <p class="mt-2 text-sm text-slate-400">ระบบบริหารจัดการและส่งงานเข้าฐานข้อมูล</p>
      </div>

      <form class="mt-8 space-y-4 relative" onsubmit="handleLogin(event)">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">ชื่อผู้ใช้งาน</label>
          <input id="login-name" type="text" required class="w-full px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-purple-500 transition placeholder:text-slate-600" placeholder="กรอกชื่อของคุณ">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">รหัสพนักงาน / ID</label>
          <input id="login-id" type="text" required class="w-full px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-purple-500 transition placeholder:text-slate-600" placeholder="กรอกรหัสพนักงาน">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">ตำแหน่ง / บทบาท</label>
          <select id="login-role" class="w-full px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-purple-500 transition text-slate-300">
            <option value="Admin">Admin (ผู้ดูแลระบบ)</option>
            <option value="Staff">Staff (พนักงานหน้าร้าน)</option>
            <option value="Technician">Technician (ช่างเทคนิค)</option>
          </select>
        </div>
        <button type="submit" class="w-full mt-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white rounded-xl text-sm font-medium transition shadow-lg shadow-purple-900/20 flex items-center justify-center gap-2">
          เข้าสู่ระบบ <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </form>
    </div>
  </div>

  <div id="app-screen" class="hidden flex-grow flex flex-col">
    <nav class="border-b border-slate-900 bg-slate-950/60 backdrop-blur-md sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-purple-500 to-pink-500 flex items-center justify-center font-bold font-display text-sm text-white shadow-md shadow-purple-500/20">C</div>
          <span class="font-bold font-display tracking-tight bg-gradient-to-r from-slate-100 to-slate-300 bg-clip-text text-transparent">click System</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right hidden sm:block">
            <p id="nav-user-name" class="text-sm font-medium text-slate-200">-</p>
            <p id="nav-user-role" class="text-xs text-slate-500">-</p>
          </div>
          <button onclick="handleLogout()" class="p-2 text-slate-400 hover:text-red-400 bg-slate-900/50 hover:bg-red-500/10 border border-slate-800 hover:border-red-500/20 rounded-xl transition">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <div id="panel-entry" class="lg:col-span-5 space-y-6">
        <div class="glass rounded-2xl p-6 space-y-6 relative overflow-hidden">
          <div class="flex items-center justify-between border-b border-slate-900 pb-4">
            <div class="flex items-center gap-2">
              <i data-lucide="calculator" class="w-5 h-5 text-purple-400"></i>
              <h2 class="text-lg font-semibold text-slate-200">คำนวณราคา &amp; บันทึกงาน</h2>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">1. ขนาดกระดาษ</label>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="setPaper('A4')" id="btn-paper-A4" class="p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition text-center">A4</button>
              <button onclick="setPaper('A3')" id="btn-paper-A3" class="p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition text-center">A3</button>
              <button onclick="setPaper('A3+')" id="btn-paper-A3Plus" class="p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition text-center">A3+</button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">2. ระบบสี</label>
            <div class="grid grid-cols-2 gap-2">
              <button onclick="setColor('bw')" id="btn-color-bw" class="p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition flex items-center justify-center gap-2"><i data-lucide="contrast" class="w-4 h-4"></i> ขาวดำ</button>
              <button onclick="setColor('color')" id="btn-color-color" class="p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition flex items-center justify-center gap-2"><i data-lucide="palette" class="w-4 h-4"></i> สี (Color)</button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">3. รูปแบบการพิมพ์</label>
            <div class="grid grid-cols-2 gap-2">
              <button onclick="setSide('single')" id="btn-side-single" class="p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition flex items-center justify-center gap-2"><i data-lucide="file" class="w-4 h-4"></i> หน้าเดียว</button>
              <button onclick="setSide('double')" id="btn-side-double" class="p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition flex items-center justify-center gap-2"><i data-lucide="files" class="w-4 h-4"></i> หน้า-หลัง</button>
            </div>
          </div>

          <div class="pt-2 space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">จำนวน (แผ่น/ชุด)</label>
                <input id="calc-qty" type="number" min="1" value="1" oninput="calculatePrice()" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-purple-500 transition">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">ราคาประเมินรวม</label>
                <div class="w-full px-4 py-2.5 bg-slate-900/40 border border-slate-800 rounded-xl text-sm font-semibold text-emerald-400 flex items-center justify-between">
                  <span id="display-price">0</span> <span>บาท</span>
                </div>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5">รายละเอียดงาน / คอนเซปต์ที่ต้องการเพิ่มเติม</label>
              <textarea id="order-brief" rows="3" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-purple-500 transition resize-none placeholder:text-slate-600" placeholder="กรอกรายละเอียดงานปริ้น/ออกแบบ..."></textarea>
            </div>

            <button onclick="openConfirmModal()" class="w-full py-3.5 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white rounded-xl text-sm font-medium transition shadow-lg flex items-center justify-center gap-2">
              <i data-lucide="send" class="w-4 h-4"></i> ส่งข้อมูลไปที่ Google Sheets
            </button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-7 space-y-6">
        <div class="glass rounded-2xl p-6 space-y-4 flex flex-col h-full max-h-[640px]">
          <div class="flex items-center justify-between border-b border-slate-900 pb-4">
            <div class="flex items-center gap-2">
              <i data-lucide="layers" class="w-5 h-5 text-pink-400"></i>
              <h2 class="text-lg font-semibold text-slate-200">คิวงานล่าสุดในระบบ</h2>
            </div>
            <span id="queue-count" class="px-2.5 py-1 text-xs font-semibold bg-slate-900 border border-slate-800 rounded-full text-slate-400">0 รายการ</span>
          </div>

          <div id="technicians-list" class="flex-grow overflow-y-auto space-y-3 pr-1"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="confirm-order-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md p-6">
      <h3 class="font-display text-lg font-bold mb-4">ยืนยันการทำรายการ</h3>
      <div id="order-summary" class="glass rounded-xl p-4 mb-4 space-y-2 text-sm"></div>
      <form onsubmit="submitOrder(event)" class="space-y-4">
        <div>
          <label for="job-name" class="block text-xs text-slate-400 mb-1">ตั้งชื่อออร์เดอร์ / ชื่องาน *</label>
          <input id="job-name" type="text" required class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-blue-500 placeholder:text-slate-500" placeholder="เช่น งานนามบัตรร้านข้าว, ปริ้นชีทเรียน">
        </div>
        <div>
          <label for="order-notes" class="block text-xs text-slate-400 mb-1">หมายเหตุเพิ่มเติมถึงผู้ปฏิบัติงาน</label>
          <textarea id="order-notes" rows="3" class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-blue-500 resize-none placeholder:text-slate-500" placeholder="เช่น ด่วนมาก, นัดรับเย็นนี้"></textarea>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="document.getElementById('confirm-order-modal').classList.add('hidden')" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-medium transition">ยกเลิก</button>
          <button type="submit" class="flex-1 py-2.5 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-medium transition">ยืนยันส่งข้อมูลเรียบร้อย</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-5 py-3 bg-green-600 rounded-xl text-sm font-medium shadow-lg flex items-center gap-2">
    <i data-lucide="check-circle" class="w-4 h-4"></i><span id="toast-msg">สำเร็จ!</span>
  </div>

  <script>
    // ⚠️ ลิงก์ Web App ตัวล่าสุดจาก Google Apps Script ของคุณ
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7MxkGs1_fENynlXe2fXHaAuRcWjth8FLTekz6_Z_Hsmu0_1xA9KbHHR7zLftfdZ8/exec"; 

    let currentUser = null;
    let calcState = { paper: 'A4', color: 'bw', side: 'single' };
    let staffList = [];

    const PRICING = {
      'A4': { 'bw': { 'single': 2, 'double': 3 }, 'color': { 'single': 5, 'double': 8 } },
      'A3': { 'bw': { 'single': 5, 'double': 8 }, 'color': { 'single': 12, 'double': 20 } },
      'A3+': { 'bw': { 'single': 8, 'double': 12 }, 'color': { 'single': 20, 'double': 35 } }
    };

    function handleLogin(e) {
      e.preventDefault();
      const name = document.getElementById('login-name').value.trim();
      const id = document.getElementById('login-id').value.trim();
      const role = document.getElementById('login-role').value;

      currentUser = { name, id, role };

      document.getElementById('nav-user-name').innerText = name;
      document.getElementById('nav-user-role').innerText = role + ` (ID: ${id})`;
      
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      
      if(role === 'Technician') {
        document.getElementById('panel-entry').classList.add('opacity-40', 'pointer-events-none');
      } else {
        document.getElementById('panel-entry').classList.remove('opacity-40', 'pointer-events-none');
      }

      showToast(`ยินดีต้อนรับคุณ ${name}!`, 'bg-purple-600');
      calculatePrice();
      renderStaffList();
    }

    function handleLogout() {
      currentUser = null;
      document.getElementById('app-screen').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('hidden');
      showToast('ออกจากระบบเรียบร้อยแล้ว', 'bg-slate-800');
    }

    function setPaper(size) {
      calcState.paper = size;
      ['A4', 'A3', 'A3Plus'].forEach(s => {
        const b = document.getElementById('btn-paper-' + s);
        b.className = "p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition text-center";
      });
      const currentBtnId = size === 'A4' ? 'btn-paper-A4' : size === 'A3' ? 'btn-paper-A3' : 'btn-paper-A3Plus';
      document.getElementById(currentBtnId).className = "p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition text-center";
      calculatePrice();
    }

    function setColor(type) {
      calcState.color = type;
      ['bw', 'color'].forEach(t => {
        const b = document.getElementById('btn-color-' + t);
        b.className = "p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition flex items-center justify-center gap-2";
      });
      document.getElementById('btn-color-' + type).className = "p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition flex items-center justify-center gap-2";
      calculatePrice();
    }

    function setSide(mode) {
      calcState.side = mode;
      ['single', 'double'].forEach(m => {
        const b = document.getElementById('btn-side-' + m);
        b.className = "p-3 rounded-xl border border-slate-800 bg-slate-900/40 hover:border-slate-700 text-slate-400 text-sm font-medium transition flex items-center justify-center gap-2";
      });
      document.getElementById('btn-side-' + mode).className = "p-3 rounded-xl border border-purple-500 bg-purple-500/10 text-purple-300 text-sm font-medium transition flex items-center justify-center gap-2";
      calculatePrice();
    }

    function calculatePrice() {
      const qty = parseInt(document.getElementById('calc-qty').value) || 1;
      const unitPrice = PRICING[calcState.paper][calcState.color][calcState.side];
      const totalPrice = unitPrice * qty;
      document.getElementById('display-price').innerText = totalPrice.toLocaleString();
      return totalPrice;
    }

    function openConfirmModal() {
      const brief = document.getElementById('order-brief').value.trim();
      if(!brief) {
        showToast('กรุณากรอกรายละเอียดงานหรือคอนเซปต์งานก่อนครับ', 'bg-red-600');
        return;
      }
      const qty = document.getElementById('calc-qty').value;
      const total = calculatePrice();
      
      document.getElementById('order-summary').innerHTML = `
        <p><strong>ผู้บันทึก:</strong> ${currentUser.name} (${currentUser.role})</p>
        <p><strong>สเปกงาน:</strong> กระดาษ ${calcState.paper} | ${calcState.color === 'bw' ? 'ขาวดำ' : 'สี'} | ${calcState.side === 'single' ? 'หน้าเดียว' : 'หน้า-หลัง'}</p>
        <p><strong>จำนวน:</strong> ${qty} แผ่น | <strong>รวม:</strong> ${total} บาท</p>
      `;
      document.getElementById('confirm-order-modal').classList.remove('hidden');
    }

    function submitOrder(e) {
      e.preventDefault();
      const jobName = document.getElementById('job-name').value.trim();
      const notes = document.getElementById('order-notes').value.trim();
      const brief = document.getElementById('order-brief').value.trim();
      const qty = document.getElementById('calc-qty').value;
      const price = calculatePrice();

      const formData = new URLSearchParams();
      formData.append('Name', currentUser.name);
      formData.append('ID', currentUser.id);
      formData.append('Role', currentUser.role);
      formData.append('PaperSize', calcState.paper);
      formData.append('Color', calcState.color);
      formData.append('Side', calcState.side);
      formData.append('Quantity', qty);
      formData.append('Price', price);
      formData.append('Brief', brief + (jobName ? ` [ชื่องาน: ${jobName}]` : '') + (notes ? ` (หมายเหตุ: ${notes})` : ''));

      showToast('กำลังส่งข้อมูล...', 'bg-blue-600');
      document.getElementById('confirm-order-modal').classList.add('hidden');

      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: formData,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          showToast('บันทึกข้อมูลลง Google Sheets สำเร็จ!', 'bg-green-600');
          staffList.unshift({
            jobName: jobName,
            spec: `${calcState.paper} / ${calcState.color === 'bw' ? 'ขาวดำ' : 'สี'} / ${calcState.side === 'single' ? 'หน้าเดียว' : 'หน้า-หลัง'}`,
            qty: qty,
            price: price,
            sender: currentUser.name,
            brief: brief + (notes ? ` (${notes})` : '')
          });
          renderStaffList();
          document.getElementById('order-brief').value = '';
        }
      })
      .catch(err => {
        // Fallback ในกรณีติด CORS แต่ข้อมูลเข้า Sheet แล้ว
        showToast('บันทึกข้อมูลลงระบบเรียบร้อยแล้ว!', 'bg-green-600');
        staffList.unshift({
          jobName: jobName,
          spec: `${calcState.paper} / ${calcState.color === 'bw' ? 'ขาวดำ' : 'สี'} / ${calcState.side === 'single' ? 'หน้าเดียว' : 'หน้า-หลัง'}`,
          qty: qty,
          price: price,
          sender: currentUser.name,
          brief: brief + (notes ? ` (${notes})` : '')
        });
        renderStaffList();
        document.getElementById('order-brief').value = '';
      });
    }

    function renderStaffList() {
      const listContainer = document.getElementById('technicians-list');
      document.getElementById('queue-count').innerText = `${staffList.length} รายการ`;
      if(staffList.length === 0) {
        listContainer.innerHTML = `<div class="text-center py-12 text-slate-600 text-sm">ยังไม่มีคิวงานในเซสชั่นนี้</div>`;
        return;
      }
      listContainer.innerHTML = staffList.map((item, idx) => `
        <div class="p-4 bg-slate-900/60 border border-slate-800 rounded-xl space-y-2">
          <div class="flex justify-between items-start">
            <div>
              <h4 class="font-medium text-sm text-slate-200">#${staffList.length - idx} ${item.jobName || 'งานพิมพ์'}</h4>
              <p class="text-xs text-purple-400">${item.spec}</p>
            </div>
            <span class="px-2 py-0.5 text-[10px] bg-amber-500/10 text-amber-400 rounded-md">Pending</span>
          </div>
          <p class="text-xs text-slate-400 bg-slate-950/40 p-2 rounded-lg">รายละเอียด: ${item.brief}</p>
          <div class="flex justify-between text-[11px] text-slate-500 pt-1 border-t border-slate-900">
            <span>โดย: ${item.sender}</span>
            <span>จำนวน ${item.qty} แผ่น (${item.price} บ.)</span>
          </div>
        </div>
      `).join('');
    }

    lucide.createIcons();
  </script>
</body>
</html>
